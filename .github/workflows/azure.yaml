name: Build and deploy an app to AKS

on:
  workflow_call:
    inputs:
      image_tag:
        required: true
        type: string
    secrets:
      AZURE_CONTAINER_REGISTRY:
        required: true
      RESOURCE_GROUP:
        required: true  
      AZURE_CLIENT_ID:
        required: true
      AZURE_TENANT_ID:
        required: true
      AZURE_SUBSCRIPTION_ID:
        required: true
      APP_CONFIG_NAME:
        required: true
      IMAGE_TAG_PARAM:
        required: true

env:
  Image_Tag: ${{ inputs.image_tag }}
  AZURE_CONTAINER_REGISTRY: ${{ secrets.AZURE_CONTAINER_REGISTRY }}
  CONTAINER_NAME: "sample-app"
  RESOURCE_GROUP: ${{ secrets.RESOURCE_GROUP }}  

permissions:
      contents: read
      id-token: write

jobs:
  buildImage:
    runs-on: ubuntu-latest
    steps:
      # Checks out the repository this file is in
      - name: Checout
        uses: actions/checkout@v4

      # Logs in with your Azure credentials
      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Login to ACR
        run: az acr login --name ${{ env.AZURE_CONTAINER_REGISTRY }}

      # Builds and pushes an image up to Azure Container Registry
      - name: Build image
        run: |
          docker build -t ${{ env.AZURE_CONTAINER_REGISTRY }}.azurecr.io/app:${{ env.Image_Tag }} .

      - name: Push image
        run: |
          docker push ${{ env.AZURE_CONTAINER_REGISTRY }}.azurecr.io/app:${{ env.Image_Tag }}
      
      - name: update image tag parameter
        run: |
          az appconfig kv set \
            --name ${{ secrets.APP_CONFIG_NAME }} \
            --key ${{ secrets.IMAGE_TAG_PARAM }} \
            --value ${{ env.Image_Tag }} \
            --yes